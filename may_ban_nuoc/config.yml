recipe: default.v1
assistant_id: drink-vending-machine-v2
language: en

pipeline:
  # DrinkEntityMasker MUST be first — it replaces drink tokens with "DRINK"
  # before WhitespaceTokenizer, so DIET never sees brand names during intent
  # classification training.  Drink entities are extracted here via alias
  # lookup; non-drink entities (size, quantity, payment…) are still extracted
  # by DIET's entity recognition on the masked text.
  - name: components.drink_entity_masker.DrinkEntityMasker

  - name: WhitespaceTokenizer

  - name: RegexFeaturizer

  - name: LexicalSyntacticFeaturizer

  - name: LanguageModelFeaturizer
    model_name: "distilbert"
    model_weights: "distilbert-base-uncased"

  - name: CountVectorsFeaturizer

  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
    entity_recognition: true
    number_of_transformer_layers: 2
    transformer_size: 256
    use_masked_language_model: false
    random_seed: 42
    drop_rate: 0.15
    BILOU_flag: true

  - name: EntitySynonymMapper

  - name: FallbackClassifier
    threshold: 0.45
    ambiguity_threshold: 0.15

policies:
  - name: MemoizationPolicy
    max_history: 8

  - name: RulePolicy
    core_fallback_threshold: 0.45
    core_fallback_action_name: "action_handle_out_of_domain"
    enable_fallback_prediction: true

  - name: UnexpecTEDIntentPolicy
    max_history: 8
    epochs: 150

  - name: TEDPolicy
    max_history: 8
    epochs: 150
    constrain_similarities: true