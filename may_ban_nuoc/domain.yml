version: "3.1"

intents:
  - greet
  - goodbye
  - order_drink
  - ask_price
  - ask_ingredients
  - ask_recommendation
  - ask_available_drinks
  - ask_product_info
  - ask_promotion
  - confirm
  - deny
  - specify_size
  - specify_quantity
  - ask_help
  - specify_payment
  - out_of_scope
  - show_cart

entities:
  - drink
  - size
  - quantity
  - payment_method

slots:
  drink:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: drink

  size:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: size
    initial_value: null

  quantity:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: quantity
    initial_value: "1"

  payment_method:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: payment_method

  # Cart stored as JSON string (supports multiple products)
  cart:
    type: text
    influence_conversation: true
    mappings:
      - type: custom
    initial_value: null

  price_per_unit:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  total_price:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  requested_slot:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_greet:
  - text: |
      🥤 Hello! Welcome to the Automatic Drink Vending Machine!

      I can help you:
      🍹 Browse menu & order drinks
      💰 Check product prices
      📋 View ingredients / product info
      🎁 Check promotions

      Type "menu" to see the full list, or just tell me what you'd like to drink! 😊

  utter_ask_drink:
  - text: "🥤 What would you like to drink? Type 'menu' to see all available products!"

  utter_ask_size:
  - text: "📦 What size would you like? (e.g. 330ml, 500ml, 1.5L)"

  utter_ask_quantity:
  - text: "🔢 How many would you like?"

  utter_ask_payment:
  - text: |
      💳 How would you like to pay?

      1️⃣ Bank Transfer (scan QR code)
      2️⃣ Cash (insert money into machine)
      3️⃣ Card (swipe/insert card)

  utter_order_confirmed:
  - text: "✅ Order confirmed! Your drink is being dispensed... 🎉"

  utter_order_cancelled:
  - text: "❌ Order cancelled. Would you like to order something else?"

  utter_payment_success:
  - text: "💚 Payment successful! Your drink is being dispensed... ⏳"

  utter_help:
  - text: |
      🤖 I am an Automatic Drink Vending Machine!

      I support:
      1. 🍹 Order drinks — "Give me 2 cans of Coca-Cola"
      2. 📋 View menu — Type "menu" or "what drinks do you have"
      3. 💰 Check price — "How much is Coca-Cola?"
      4. 🧪 Ingredients — "What's in Red Bull?"
      5. ⭐ Recommendations — "What's good today?"
      6. 🎁 Promotions — "Any discounts?"
      7. 🛒 View cart — "Show my cart"

      When ordering: I will add items to your cart first.
      Type "confirm" when you are ready to pay! 😊

  utter_goodbye:
  - text: "👋 Goodbye! Thank you for using our service. See you again! 😊"

  utter_out_of_scope:
  - text: "😅 That question is outside my scope! I only support drink orders. Type 'help' for guidance."

  utter_fallback:
  - text: |
      🤔 Sorry, I didn't understand that.
      You can try:
      • Type "menu" to see the product list
      • Say the name of the drink you want
      • Type "help" for instructions

actions:
  - action_get_drink_info
  - action_calculate_price
  - action_show_order_summary
  - action_confirm_order
  - action_show_price
  - action_show_ingredients
  - action_show_product_info
  - action_show_menu
  - action_recommend_drink
  - action_process_payment
  - action_reset_order
  - action_check_promotion
  - action_ask_quantity
  - action_handle_out_of_domain
  - action_add_to_cart
  - action_show_cart

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
