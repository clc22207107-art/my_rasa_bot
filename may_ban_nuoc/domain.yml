version: "3.1"

intents:
  - greet
  - goodbye
  - order_drink
  - ask_recommendation
  - ask_available_drinks
  - ask_product_info
  - ask_price
  - ask_ingredients
  - ask_brand
  - ask_flavor
  - ask_stock
  - ask_features
  - ask_expiry
  - ask_category
  - ask_size
  - ask_popularity
  - ask_promotion
  - confirm
  - deny
  - specify_size
  - specify_quantity
  - ask_help
  - specify_payment
  - show_cart
  - remove_from_cart
  - clear_cart
  - change_order
  - ask_payment_methods
  - complain
  - ask_diet_option
  - compare_drinks
  - apply_coupon
  - reorder_last
  - request_receipt
  - ask_refund
  - ask_order_status
  - ask_machine_identity
  - ask_cheapest
  - ask_drink_by_category
  - ask_caffeine_free
  - ask_new_products
  - ask_sugar_content
  - ask_caffeine_info
  - ask_price_range
  - ask_ingredient_check
  - ask_payment_check
  - ask_most_popular
  - ask_drink_count
  - ask_no_sugar
  - ask_cheapest_in_category
  - ask_by_brand

entities:
  - drink
  - size
  - quantity
  - payment_method
  - info_type
  - category
  - price_limit
  - ingredient

slots:
  drink:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: drink

  size:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: size
    initial_value: null

  quantity:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: quantity
    initial_value: "1"

  payment_method:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: payment_method

  # Cart stored as JSON string (supports multiple products)
  cart:
    type: text
    influence_conversation: true
    mappings:
      - type: custom
    initial_value: null

  price_per_unit:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

  total_price:
    type: text
    influence_conversation: true
    mappings:
      - type: custom

  requested_slot:
    type: text
    influence_conversation: false
    mappings:
      - type: custom

responses:
  utter_greet:
  - text: "Hello! Welcome to the vending machine. Say menu to see drinks, or tell me what you want!"

  utter_ask_drink:
  - text: "🥤 What would you like to drink? Type 'menu' to see all available products!"

  utter_ask_size:
  - text: "📦 What size would you like? (e.g. 330ml, 500ml, 1.5L)"

  utter_ask_quantity:
  - text: "🔢 How many would you like?"

  utter_ask_payment:
  - text: "How would you like to pay? Cash, card, or bank transfer?"

  utter_order_confirmed:
  - text: "✅ Order confirmed! Your drink is being dispensed... 🎉"

  utter_order_cancelled:
  - text: "❌ Order cancelled. Would you like to order something else?"

  utter_payment_success:
  - text: "💚 Payment successful! Your drink is being dispensed... ⏳"

  utter_help:
  - text: "You can order drinks, check prices, ask about ingredients, or view the menu. Say confirm when ready to pay."

  utter_goodbye:
  - text: "👋 Goodbye! Thank you for using our service. See you again! 😊"

  utter_out_of_scope:
  - text: "😅 That question is outside my scope! I only support drink orders. Type 'help' for guidance."

  utter_fallback:
  - text: "Sorry, I didn't understand. Try saying menu or the name of a drink."

  utter_payment_methods:
  - text: "We accept: 💵 Cash · 💳 Card (Visa/Mastercard/ATM) · 📱 MoMo · ZaloPay · VNPay · QR Code. Say which method you prefer!"

  utter_complain:
  - text: "Sorry to hear that! 😔 Please press the maintenance button or contact our support team. We apologize for the inconvenience."

  utter_diet_option:
  - text: "🥗 Healthy/low-sugar options: Zero Degree Green Tea, C2, Lipton, Dr Thanh, Oolong Tea. All are lightly sweetened or unsweetened. Which one would you like?"

  utter_apply_coupon:
  - text: "🎟️ Please enter your promo code at the payment screen. Discounts are applied automatically at checkout!"

  utter_reorder_last:
  - text: "🔄 Sorry, I don't have access to your order history yet. Please tell me what you'd like to order!"

  utter_request_receipt:
  - text: "🧾 A digital receipt is sent via QR code after payment. For a printed receipt, please press the receipt button on the machine panel."

  utter_refund:
  - text: "💸 For refunds, please press the refund button or contact support. Refunds are processed within 24 hours. Sorry for the trouble!"

  utter_order_status:
  - text: "⏳ Your order is being processed! The drink should dispense within a few seconds. If nothing comes out, please press the help button."

  utter_machine_identity:
  - text: "🤖 I'm an AI-powered smart vending machine! I understand voice and text commands. You can order drinks, check prices, ask about ingredients, compare products, and more. Say 'menu' to get started!"

actions:
  - action_get_drink_info
  - action_calculate_price
  - action_show_order_summary
  - action_confirm_order
  - action_show_menu
  - action_recommend_drink
  - action_process_payment
  - action_reset_order
  - action_check_promotion
  - action_ask_quantity
  - action_handle_out_of_domain
  - action_add_to_cart
  - action_show_cart
  - action_answer_product_query
  - action_remove_from_cart
  - action_clear_cart
  - action_compare_drinks
  - action_cheapest_drinks
  - action_drink_by_category
  - action_new_products
  - action_caffeine_free_drinks
  - action_price_range
  - action_ingredient_check
  - action_payment_check
  - action_most_popular
  - action_drink_count
  - action_no_sugar
  - action_cheapest_in_category
  - action_by_brand

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
