version: "3.1"

rules:

# ==================== BASIC ====================
- rule: Greet user
  steps:
    - intent: greet
    - action: utter_greet

- rule: Ask for help
  steps:
    - intent: ask_help
    - action: utter_help

- rule: Goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

# ==================== MENU ====================
- rule: View menu
  steps:
    - intent: ask_available_drinks
    - action: action_show_menu

# ==================== CART ====================
- rule: View cart
  steps:
    - intent: show_cart
    - action: action_show_cart

# ==================== ORDER (CART-BASED FLOW) ====================
# When customer orders → fetch info → calculate price → add to cart
- rule: Order drink - add to cart
  steps:
    - intent: order_drink
    - action: action_get_drink_info
    - action: action_calculate_price
    - action: action_add_to_cart

# When quantity is already in the order message → add to cart directly
- rule: Order with quantity - add to cart
  steps:
    - intent: specify_quantity
    - action: action_calculate_price
    - action: action_add_to_cart

# When size is specified standalone (e.g. after asking info about a drink)
- rule: Specify size for current drink
  steps:
    - intent: specify_size
    - action: action_add_to_cart

# Confirm order → show summary + ask for payment
- rule: Confirm order - ask for payment
  steps:
    - intent: confirm
    - action: action_confirm_order

# Cancel order
- rule: Cancel order
  steps:
    - intent: deny
    - action: action_reset_order

# ==================== PAYMENT ====================
# Process payment after order is confirmed
- rule: Process payment
  steps:
    - intent: specify_payment
    - action: action_process_payment

# ==================== PRODUCT INFO ====================
- rule: Ask product info - single aspect
  steps:
    - or:
      - intent: ask_price
      - intent: ask_ingredients
      - intent: ask_brand
      - intent: ask_flavor
      - intent: ask_stock
      - intent: ask_features
      - intent: ask_expiry
      - intent: ask_category
      - intent: ask_size
      - intent: ask_popularity
      - intent: ask_product_info
    - action: action_get_drink_info
    - action: action_answer_product_query

# ==================== RECOMMENDATION ====================
- rule: Recommend drink
  steps:
    - intent: ask_recommendation
    - action: action_recommend_drink

# ==================== PROMOTION ====================
- rule: Check promotion
  steps:
    - intent: ask_promotion
    - action: action_check_promotion

# ==================== OUT OF SCOPE ====================
- rule: Handle out-of-scope questions
  steps:
    - intent: out_of_scope
    - action: action_handle_out_of_domain

- rule: Fallback
  steps:
    - intent: nlu_fallback
    - action: utter_fallback
