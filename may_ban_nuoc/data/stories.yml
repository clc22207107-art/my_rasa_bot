version: "3.1"

stories:

# ==================== ORDER FLOW (CART-BASED) ====================

- story: Order Coca - add to cart - confirm - bank transfer
  steps:
    - intent: order_drink
      entities:
        - drink: "coca"
        - quantity: "2"
    - action: action_get_drink_info
    - action: action_calculate_price
    - action: action_add_to_cart
    - intent: confirm
    - action: action_confirm_order
    - intent: specify_payment
      entities:
        - payment_method: "bank transfer"
    - action: action_process_payment

- story: Order Pepsi - add to cart - confirm - cash
  steps:
    - intent: order_drink
      entities:
        - drink: "pepsi"
        - quantity: "3"
