version: "3.1"

stories:

# ==================== LUỒNG ĐẶT HÀNG MỚI (CART-BASED) ====================
# Khách đặt 1 món → vào giỏ → xác nhận → thanh toán chuyển khoản

- story: Đặt Coca - vào giỏ - xác nhận - chuyển khoản
  steps:
    - intent: order_drink
      entities:
        - drink: "coca"
        - quantity: "2"
    - action: action_get_drink_info
    - action: action_calculate_price
    - action: action_add_to_cart
    - intent: confirm
    - action: action_confirm_order
    - intent: specify_payment
      entities:
        - payment_method: "chuyển khoản"
    - action: action_process_payment

- story: Đặt Pepsi - vào giỏ - xác nhận - tiền mặt
  steps:
    - intent: order_drink
      entities:
        - drink: "pepsi"
        - quantity: "3"
    - action: action_get_drink_info
    - action: action_calculate_price
    - action: action_add_to_cart
    - intent: confirm
    - action: action_confirm_order
    - intent: specify_payment
      entities:
        - payment_method: "tiền mặt"
    - action: action_process_payment

- story: Đặt hàng - vào giỏ - xác nhận - quẹt thẻ - tạm biệt
  steps:
    - intent: order_drink
      entities:
        - drink: "redbull"
        - quantity: "1"
    - action: action_get_drink_info
    - action: action_calculate_price
    - action: action_add_to_cart
    - intent: confirm
    - action: action_confirm_order
    - intent: specify_payment
      entities:
        - payment_method: "quẹt thẻ"
    - action: action_process_payment
    - intent: goodbye
    - action: utter_goodbye

